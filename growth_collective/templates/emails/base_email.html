<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block subject %}Growth Collective{% endblock %}</title>
  <style>
    body { margin: 0; padding: 0; background: #fafaf8; font-family: 'DM Sans', Arial, sans-serif; color: #1a2332; }
    .wrapper { max-width: 600px; margin: 40px auto; background: #fff; border: 1px solid #e8e8e4; }
    .header { background: #1a2332; padding: 32px 40px; }
    .header__logo { color: #d4a574; font-size: 22px; font-weight: 600; text-decoration: none; }
    .body { padding: 40px; }
    h1 { font-size: 24px; font-weight: 600; margin: 0 0 16px; }
    p { line-height: 1.6; margin: 0 0 16px; }
    .btn { display: inline-block; background: #d4a574; color: #1a2332; font-weight: 600; padding: 12px 24px; text-decoration: none; margin: 8px 0; }
    .footer { padding: 24px 40px; background: #f5f5f2; border-top: 1px solid #e8e8e4; }
    .footer p { font-size: 13px; color: #666; margin: 0; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <span class="header__logo">Growth Collective</span>
    </div>
    <div class="body">
      {% block body %}{% endblock %}
    </div>
    <div class="footer">
      <p>&copy; {% now "Y" %} Growth Collective. You're receiving this because you're a member.</p>
    </div>
  </div>
</body>
</html>
